<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Object Detection System</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Object Detection System</h1>
        <div style="display: flex; gap: 10px; align-items: center">
          <div id="status" class="status disconnected">Disconnected</div>
        </div>
      </header>

      <main>
        <div class="auth-section" id="auth-section">
          <button
            id="connectBtn"
            class="btn btn-start"
            type="button"
            aria-label="Start Object Detection System"
          >
            Start Object Detection System
          </button>
        </div>

        <div class="session-end-section hidden" id="session-end-section">
          <h2>Session Ended</h2>
          <button id="restartBtn" class="btn">Start New Session</button>
        </div>

        <div class="app-section hidden" id="app-section">
          <div class="video-container">
            <div id="video-placeholder">Start camera to send video</div>
            <video id="video-preview" autoplay playsinline muted></video>
            <canvas id="video-canvas" style="display: none"></canvas>
          </div>

          <div class="controls controls--app">
            <button
              id="disconnectBtn"
              class="btn icon-btn danger btn-disconnect"
              type="button"
            >
              Disconnect
            </button>
          </div>
        </div>
      </main>
    </div>
    <script src="/static/media-handler.js"></script>
    <script src="/static/gemini-client.js"></script>
    <script src="/static/main.js"></script>
  </body>
</html>
